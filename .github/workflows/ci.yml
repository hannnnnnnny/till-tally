name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: install / format / lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Validate Prisma schema
        run: npm run prisma:validate -w server
        env:
          DATABASE_URL: postgresql://tilltally:tilltally@localhost:5432/tilltally?schema=public

      - name: Generate Prisma client
        run: npm run prisma:generate -w server
        env:
          DATABASE_URL: postgresql://tilltally:tilltally@localhost:5432/tilltally?schema=public

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Analytics evaluation
        run: npm run test:analytics-evals -w server

      - name: Test
        # Runs each workspace's test script if present; a no-op until tests exist.
        env:
          NODE_ENV: test
        run: |
          export JWT_ACCESS_SECRET="$(openssl rand -hex 32)"
          export JWT_REFRESH_SECRET="$(openssl rand -hex 32)"
          npm test --workspaces --if-present

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser test
        run: npm run test:e2e

      - name: Build
        run: npm run build
