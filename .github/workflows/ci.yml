name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: install / format / lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Validate Prisma schema
        run: npm run prisma:validate -w server
        env:
          DATABASE_URL: postgresql://tilltally:tilltally@localhost:5432/tilltally?schema=public

      - name: Generate Prisma client
        run: npm run prisma:generate -w server
        env:
          DATABASE_URL: postgresql://tilltally:tilltally@localhost:5432/tilltally?schema=public

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        # Runs each workspace's test script if present; a no-op until tests exist.
        env:
          NODE_ENV: test
        run: |
          export JWT_ACCESS_SECRET="$(openssl rand -hex 32)"
          export JWT_REFRESH_SECRET="$(openssl rand -hex 32)"
          npm test --workspaces --if-present

      - name: Build
        run: npm run build
