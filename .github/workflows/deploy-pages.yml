name: Deploy Client to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly refresh re-records fixtures so demo sample dates stay current.
    - cron: '0 16 * * 1'

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: record demo data, verify, and deploy
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tilltally
          POSTGRES_PASSWORD: tilltally
          POSTGRES_DB: tilltally
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U tilltally -d tilltally"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://tilltally:tilltally@localhost:5432/tilltally?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Migrate and seed the demo database
        run: |
          npm run prisma:generate -w server
          npm run prisma:deploy -w server
          npm run db:seed

      - name: Build and start the API
        run: |
          npm run build -w @till-tally/analytics-contracts
          npm run build -w server
          export JWT_ACCESS_SECRET="$(openssl rand -hex 32)"
          export JWT_REFRESH_SECRET="$(openssl rand -hex 32)"
          node server/dist/app.js &
          echo $! > server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:4000/api/health/ready > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo 'API did not become ready' >&2
          exit 1

      - name: Record demo fixtures
        run: npm run demo:record
        env:
          DEMO_SERVER_URL: http://localhost:4000

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Demo smoke gate
        run: npm run test:e2e:demo

      - name: Build client for Pages
        run: npm run build -w client
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name || 'till-tally' }}/
          VITE_DEMO_MODE: 'true'

      - name: Stop the API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
