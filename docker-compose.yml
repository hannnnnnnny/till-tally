# TillTally services.
#
#   Database only (for local dev):  docker compose up -d db
#   Full stack (build + run):        docker compose up -d --build
#   Status / health:                 docker compose ps
#   Logs:                            docker compose logs -f
#   Stop:                            docker compose down          (keeps data)
#   Reset:                           docker compose down -v        (also removes the data volume)
#
# Services:
#   db      PostgreSQL 16        -> localhost:5432
#   server  Express API          -> localhost:4000  (GET /api/health)
#   client  React build (nginx)  -> localhost:8080
#
# Database credentials default to dev-only values and match server/.env.example.
# Server JWT defaults are intentionally invalid for production and must be
# overridden via a root .env file or shell environment variables.

services:
  db:
    image: postgres:16-alpine
    container_name: tilltally-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tilltally}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tilltally}
      POSTGRES_DB: ${POSTGRES_DB:-tilltally}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - tilltally-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tilltally} -d ${POSTGRES_DB:-tilltally}']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: tilltally-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tilltally}:${POSTGRES_PASSWORD:-tilltally}@db:5432/${POSTGRES_DB:-tilltally}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${SERVER_PORT:-4000}:4000'

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: tilltally-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  tilltally-db-data:
