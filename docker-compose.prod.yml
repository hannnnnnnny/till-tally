# Production compose file for an Ubuntu host behind Nginx.
#
# Usage:
#   cp .env.production.example .env.production
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build db
#   docker compose --env-file .env.production -f docker-compose.prod.yml run --rm migrate
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build server client

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.production}
    volumes:
      - tilltally-prod-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: build
    restart: 'no'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: npm run prisma:deploy -w server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env.production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env.production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      CLIENT_ORIGIN: ${PUBLIC_APP_URL:?Set PUBLIC_APP_URL in .env.production}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '4000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'HEALTHCHECK_URL=http://127.0.0.1:4000/api/health/ready node server/dist/healthcheck.js',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:80'

volumes:
  tilltally-prod-db-data:
